<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Голос → Обличчя</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  height: 100vh;
  background: #080806;
  overflow: hidden;
  font-family: monospace;
}

#face-area {
  position: fixed;
  inset: 0;
}

canvas {
  width: 100vw;
  height: 100vh;
  display: block;
}

#placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #333;
  letter-spacing: 2px;
}

#btn-area {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

#rec-status { color: #555; font-size: 12px; }
#error-msg { color: red; font-size: 12px; }

button {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 1px solid #333;
  background: none;
  cursor: pointer;
}

#btn-dot {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: red;
}
</style>
</head>

<body>

<div id="face-area">
  <canvas id="canvas"></canvas>
  <div id="placeholder">НАТИСНИ ДЛЯ ЗАПИСУ</div>
</div>

<div id="btn-area">
  <div id="error-msg"></div>
  <div id="rec-status"></div>
  <button id="main-btn"><div id="btn-dot"></div></button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let mediaRecorder;
let isRecording = false;

const btn = document.getElementById("main-btn");
const status = document.getElementById("rec-status");
const errorMsg = document.getElementById("error-msg");

btn.onclick = async () => {
  errorMsg.textContent = "";

  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.start();

      isRecording = true;
      status.textContent = "Запис...";

    } catch (e) {
      console.error(e);
      errorMsg.textContent = "Помилка мікрофона: " + e.message;
    }

  } else {
    mediaRecorder.stop();
    isRecording = false;
    status.textContent = "Готово";
  }
};
</script>

</body>
</html>
